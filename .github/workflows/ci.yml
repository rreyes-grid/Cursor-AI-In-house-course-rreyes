name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  frontend-lint:
    name: Frontend — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm run lint

  frontend-e2e:
    name: Frontend — e2e (${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --prefer-offline
      - uses: actions/cache@v4
        id: playwright-browsers
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --shard=${{ matrix.shard }}/2

  frontend-build:
    name: Frontend — production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --prefer-offline
      - name: Build (GitHub Pages base path)
        run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 60

  backend:
    name: Backend — compile + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ecommerce_api/requirements.txt
            ecommerce_api/requirements-dev.txt
      - working-directory: ecommerce_api
        run: |
          pip install -r requirements-dev.txt
          python -m compileall -q app run.py
          pytest tests/ -q --tb=short

  security-node:
    name: Security — npm audit + Snyk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm audit --audit-level=high
      - name: Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "SNYK_TOKEN repository secret not set; skipping Snyk."
            exit 0
          fi
          npx -y snyk@latest test --severity-threshold=high

  docker-verify:
    name: Docker — build + GHA cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build storefront image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/frontend/Dockerfile
          push: false
          tags: ci-practice-storefront:latest
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront
      - name: Build ecommerce API image (cache)
        uses: docker/build-push-action@v6
        with:
          context: ecommerce_api
          file: ecommerce_api/Dockerfile
          push: false
          tags: ci-practice-ecommerce-api:latest
          cache-from: type=gha,scope=ecommerce-api
          cache-to: type=gha,mode=max,scope=ecommerce-api

  publish-github-pages:
    name: Publish (GitHub Pages)
    needs:
      - frontend-lint
      - frontend-e2e
      - frontend-build
      - backend
      - security-node
      - docker-verify
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && vars.PUBLISH_GITHUB_PAGES == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
      - name: Health check (published site)
        env:
          PAGE_URL: ${{ steps.deploy.outputs.page_url }}
        run: |
          test -n "$PAGE_URL"
          curl -fsS --retry 10 --retry-delay 6 --retry-all-errors "$PAGE_URL"

  deploy-backend:
    name: Deploy (backend bundle + hook + health)
    needs:
      - frontend-lint
      - frontend-e2e
      - frontend-build
      - backend
      - security-node
      - docker-verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package ecommerce API
        run: |
          tar -czf ecommerce-api.tar.gz \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*.pyc' \
            -C ecommerce_api .
      - uses: actions/upload-artifact@v4
        with:
          name: ecommerce-api-release
          path: ecommerce-api.tar.gz
          retention-days: 60
      - name: Trigger deploy hook and/or health URL
        env:
          HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
          HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          if [ -n "${HOOK_URL:-}" ]; then
            curl -fsS -X POST "$HOOK_URL"
            echo ""
          fi
          if [ -n "${HEALTH_URL:-}" ]; then
            curl -fsS --retry 10 --retry-delay 6 --retry-all-errors "${HEALTH_URL}"
          fi
          if [ -z "${HOOK_URL:-}" ] && [ -z "${HEALTH_URL:-}" ]; then
            echo "Set BACKEND_DEPLOY_HOOK_URL and/or BACKEND_HEALTH_URL to verify remote deploy."
          fi

  notify-slack-on-failure:
    name: Notify Slack (failure)
    runs-on: ubuntu-latest
    needs:
      - frontend-lint
      - frontend-e2e
      - frontend-build
      - backend
      - security-node
      - docker-verify
      - publish-github-pages
      - deploy-backend
    if: >-
      always()
      && (
        needs.frontend-lint.result == 'failure'
        || needs.frontend-e2e.result == 'failure'
        || needs.frontend-build.result == 'failure'
        || needs.backend.result == 'failure'
        || needs.security-node.result == 'failure'
        || needs.docker-verify.result == 'failure'
        || needs.publish-github-pages.result == 'failure'
        || needs.deploy-backend.result == 'failure'
      )
    steps:
      - name: Post failure to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack notification."
            exit 0
          fi
          payload=$(
            jq -nc \
              --arg wf "${GITHUB_WORKFLOW}" \
              --arg ref "${GITHUB_REF_NAME:-unknown}" \
              --arg run "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              '{text: (":x: *\($wf)* failed on `\($ref)` <" + $run + "|View run>")}'
          )
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
